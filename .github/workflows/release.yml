name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install cross-compilers (Linux ARM64 + Windows x64)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y gcc-aarch64-linux-gnu mingw-w64

      - name: Install llvm-mingw (Windows ARM64)
        run: |
          LLVM_VER=$(curl -s https://api.github.com/repos/mstorsjo/llvm-mingw/releases/latest \
            | grep '"tag_name"' | cut -d'"' -f4)
          ARCHIVE="llvm-mingw-${LLVM_VER}-ucrt-ubuntu-22.04-x86_64.tar.xz"
          curl -fsSL "https://github.com/mstorsjo/llvm-mingw/releases/download/${LLVM_VER}/${ARCHIVE}" \
            -o /tmp/llvm-mingw.tar.xz
          sudo tar -xf /tmp/llvm-mingw.tar.xz -C /opt/
          echo "/opt/llvm-mingw-${LLVM_VER}-ucrt-ubuntu-22.04-x86_64/bin" >> $GITHUB_PATH

      - name: Build Linux + Windows targets
        run: make linux-x64 linux-arm64 windows-x64 windows-arm64

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-windows-binaries
          path: |
            overload-linux-x64
            overload-linux-arm64
            overload-windows-x64.exe
            overload-windows-arm64.exe

  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build macOS x64 and ARM64
        run: make macos-x64 macos-arm64

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-binaries
          path: |
            overload-macos-x64
            overload-macos-arm64

  release:
    needs: [build-linux, build-macos]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "overload ${{ github.ref_name }}"
          draft: false
          prerelease: false
          make_latest: true
          generate_release_notes: true
          files: |
            overload-linux-x64
            overload-linux-arm64
            overload-windows-x64.exe
            overload-windows-arm64.exe
            overload-macos-x64
            overload-macos-arm64
